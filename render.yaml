services:
  # 1. Backend service and CRO Listener (combined in a single free service)
  - type: web
    name: verdict-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Other secret environment variables will be linked manually in the Render dashboard for security

  # 2. Frontend service (fast and free static site)
  - type: static
    name: verdict-frontend
    publishPath: ./frontend # Modify this path if frontend files are located in a different directory (e.g., root or build)
    buildCommand: "" # If the interface is plain HTML/JS, leave it blank. If it is React, use: npm run build